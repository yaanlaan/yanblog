# ===========================================
# YanBlog 配置文件
# 复制为 config/backend/config.yaml 后修改
# ===========================================

server:
  AppMode: debug
  HttpPort: :8080
  SiteUrl:

database:
  # SQLite（默认，无需额外配置）或 MYSQL
  Db: SQLite
  DbHost: localhost
  DbPort: 3306
  DbUser: root
  DbPassWord: rootpassword
  DbName: data/yanblog.db

# JWT 密钥（必须修改）
# 生成: openssl rand -hex 32
JwtKey:

weather:
  DefaultCity: Hefei

# 前端配置文件路径
FrontEndConfigPath: config/frontend/config.yaml
