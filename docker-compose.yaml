services:
  yanblog:
    build: .
    ports:
      - "3002:80"   # 前台
      - "3011:81"   # 后台
    volumes:
      # 上传文件：宿主机可直接管理/备份
      - ./uploads:/app/uploads
      # 数据库：持久化，重建容器不丢失
      - ./data:/app/data
      # 配置：直接挂载，后台修改即时生效且持久化
      - ./config:/app/config
    restart: always

volumes: {}
